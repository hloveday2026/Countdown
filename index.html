<!DOCTYPE html>
<html>
<head>
  <title>Countdown to Deadline</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:100px; background:#eef2ff;">

<h1>Countdown to Deadline</h1>

<div id="countdown" style="font-size:30px; margin-top:20px;"></div>

<script>
const target = new Date("2026-08-17T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = target - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "Time's up!";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
