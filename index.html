<!DOCTYPE html>
<html>
<head>
  <title>Ben's Thesis Countdown</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1e1b4b, #020617);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      text-align: center;
    }

    h1 { font-size: 36px; margin-bottom: 5px; }
    h2 { font-size: 20px; opacity: 0.8; margin-bottom: 30px; }

    .countdown { display: flex; gap: 20px; }

    .time-box {
      background: rgba(255,255,255,0.05);
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
      min-width: 90px;
    }

    .value { font-size: 40px; font-weight: bold; color: #a5b4fc; }
    .label { font-size: 14px; opacity: 0.7; }

    .progress-container {
      width: 300px;
      height: 12px;
      margin-top: 30px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #f87171, #ef4444);
      width: 0%;
      transition: width 0.5s;
    }

    .percent { margin-top: 8px; font-size: 14px; opacity: 0.8; }

    .urgent {
      margin-top: 30px;
      font-size: 18px;
      color: #f87171;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<h1>⏳ Countdown</h1>
<h2>until Ben's thesis is due</h2>

<div class="countdown">
  <div class="time-box"><div class="value" id="days"></div><div class="label">Days</div></div>
  <div class="time-box"><div class="value" id="hours"></div><div class="label">Hours</div></div>
  <div class="time-box"><div class="value" id="minutes"></div><div class="label">Minutes</div></div>
  <div class="time-box"><div class="value" id="seconds"></div><div class="label">Seconds</div></div>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progress"></div>
</div>
<div class="percent" id="percent"></div>

<div class="urgent">⚠️ YOU SHOULD BE WRITING RIGHT NOW ⚠️</div>

<script>
const start = new Date("2026-05-27T00:00:00");
const target = new Date("2026-08-17T00:00:00");

function beep(freq, duration) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = freq;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  setTimeout(() => ctx.close(), duration * 1000);
}

function updateCountdown() {
  const now = new Date();
  const diff = target - now;

  if (diff <= 0) {
    beep(200, 1);
    document.body.innerHTML = "<h1>🚨 IT'S DUE. PANIC. 🚨</h1>";
    return;
  }

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const minutes = Math.floor((diff/(1000*60))%60);
  const seconds = Math.floor((diff/1000)%60);

  document.getElementById('days').innerText = days;
  document.getElementById('hours').innerText = hours;
  document.getElementById('minutes').innerText = minutes;
  document.getElementById('seconds').innerText = seconds;

  const total = target - start;
  const elapsed = now - start;
  let percent = Math.min(100, Math.max(0, (elapsed / total) * 100));

  document.getElementById('progress').style.width = percent + '%';
  document.getElementById('percent').innerText = percent.toFixed(1) + '% complete';

  if (seconds === 0) beep(600, 0.1);
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
