<!DOCTYPE html>
<html>
<head>
  <title>Ben's Thesis Countdown</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1e1b4b, #020617);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      font-weight: normal;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .countdown {
      display: flex;
      gap: 25px;
    }

    .time-box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
      min-width: 90px;
    }

    .value {
      font-size: 42px;
      font-weight: bold;
      color: #a5b4fc;
    }

    .label {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .urgent {
      margin-top: 40px;
      font-size: 18px;
      color: #f87171;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<h1>⏳ Countdown</h1>
<h2>until Ben's thesis is due</h2>

<div class="countdown">
  <div class="time-box">
    <div class="value" id="days">0</div>
    <div class="label">Days</div>
  </div>
  <div class="time-box">
    <div class="value" id="hours">0</div>
    <div class="label">Hours</div>
  </div>
  <div class="time-box">
    <div class="value" id="minutes">0</div>
    <div class="label">Minutes</div>
  </div>
  <div class="time-box">
    <div class="value" id="seconds">0</div>
    <div class="label">Seconds</div>
  </div>
</div>

<div class="urgent">⚠️ Time is running out... ⚠️</div>

<script>
const target = new Date("2026-08-17T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = target - now;

  if (diff <= 0) {
    document.body.innerHTML = "<h1>🚨 IT'S DUE. GOOD LUCK BEN 🚨</h1>";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
